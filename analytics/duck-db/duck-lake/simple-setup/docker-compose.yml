services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ducklake_catalog
      POSTGRES_USER: ducklake
      POSTGRES_PASSWORD: ducklake
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  duckdb:
    build:
      context: .
      dockerfile: Dockerfile.duckdb
    image: simple-setup-duckdb:latest
    depends_on:
      postgres:
        condition: service_healthy
    stdin_open: true
    tty: true
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - ./data/ducklake:/workspace/data/ducklake
    command: ["duckdb"]

volumes:
  postgres_data:
